<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="png" href="images/ghost.svg">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/signup.css">


    <title>Pixels | Sign Up</title>
</head>
<body>
    
    <header>
        <a href="index.html">
            <i class="fa-solid fa-ghost"></i>pixels
        </a>
    </header>

    <main>
        
        <div class="container">
            <form action="#">
                <h1>Sign Up</h1>

                <div class="input-box">
                    <input type="email" placeholder="Email Address" required name="email">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Username" required name="user">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" required placeholder="Password" name="pass" minlength="4" maxlength="10">
                    <i class="fa-solid fa-key"></i>
                </div>
                <div class="input-box">
                    <input type="password" required placeholder="Confirm Password" name="pass" minlength="4" maxlength="10">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <input type="submit" class="login-btn" value="Sign Up">
            </form>
        </div>

    </main>

    <footer>
        <a class = "logo" href = "index.html"> Pixels </a>
        <p>&copy; 2026 Pixels | All rights reserved</p>
    </footer>

</body>
</html>
