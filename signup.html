<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="png" href="images/ghost.svg">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/signup.css">


    <title>Pixels | Sign Up</title>
</head>
<body>
    

    <main>
        
        <div class="container">
            <form action="#">
                <h1> <i class="fa-solid fa-ghost"></i> Pixels</h1>
                <h3>Create an account</h3>

                <div class="input-box">
                    <input type="email" placeholder="Email Address" required name="email">
                    <i class="fa-solid fa-envelope"></i>
                </div>
                <div class="input-box">
                    <input type="text" placeholder="Username" required name="user">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" required placeholder="Password" name="pass" minlength="4" maxlength="10">
                    <i class="fa-solid fa-key"></i>
                </div>
                <div class="input-box">
                    <input type="password" required placeholder="Confirm Password" name="pass" minlength="4" maxlength="10">
                    <i class="fa-solid fa-lock"></i>
                </div>
                <input type="submit" class="login-btn" value="Sign Up">
                <div class="have-acc">
                    <p>Already have an account?</p><a href="signin.html">Sign in</a>
                </div>
            </form>
        </div>

    </main>


</body>
</html>
