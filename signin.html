<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="icon" type="png" href="images/ghost.svg">
    <link rel="stylesheet" href="/css/global.css">
    <link rel="stylesheet" href="/css/signin.css">
    <title>Pixels | Login</title>
  </head>
  <body>
    
    <header>
        <a href="index.html">
            <i class="fa-solid fa-ghost"></i>pixels
        </a>
    </header>

    <main>
        
        <div class="container">
            <form action="#">
                <h1>Sign In</h1>
                <div class="input-box">
                    <input type="text" placeholder="Username" required name="user">
                    <i class="fa-solid fa-user"></i>
                </div>
                <div class="input-box">
                    <input type="password" required placeholder="Password" name="pass" minlength="4" maxlength="10">
                    <i class="fa-solid fa-lock"></i>
                    <div class="forget" style="display: none;">
                        <a href="#">Forgot Password?</a>
                    </div>
                </div>
                <input type="submit" class="login-btn" value="Sign In">
                <div class="register">
                    <p>New Here?</p>
                    <a href="#">Create an account</a>
                </div>
            </form>
        </div>

    </main>

    <footer>
        <a class = "logo" href = "index.html"> Pixels </a>
        <p>&copy; 2026 Pixels | All rights reserved</p>
    </footer>
    </body>
</html>
